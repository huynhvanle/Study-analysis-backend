<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base href="/study-analysis/" />
  <meta name="api-root" content="/study-analysis" />
  <title>StudyHub — Sửa khóa học (Admin)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css?v=43" />
</head>
<body data-app-shell="admin">
  <div id="app" class="app app--admin-dashboard" aria-hidden="false">
    <div class="admin-layout">
      <aside class="sidebar admin-sidebar" aria-label="Menu quản trị">
        <div class="admin-sidebar-brand">
          <span class="admin-brand-mark" aria-hidden="true">📚</span>
          <div class="admin-brand-text">
            <span class="admin-brand-name">Study<span class="admin-brand-accent">Hub</span></span>
            <span class="admin-brand-sub">Admin Console</span>
          </div>
        </div>
        <p class="sidebar-label admin-sidebar-label" id="navSectionLabel">Quản trị</p>
        <nav class="sidebar-nav" id="nav"></nav>
      </aside>

      <div class="admin-layout-main">
        <header class="topbar admin-topbar">
          <div class="admin-topbar-search-wrap">
            <span class="admin-search-icon" aria-hidden="true">🔍</span>
            <input
              type="search"
              class="admin-topbar-search"
              placeholder="Tìm kiếm trong quản trị…"
              disabled
              title="Tính năng đang phát triển"
              aria-label="Tìm kiếm (sắp có)"
            />
          </div>
          <div class="topbar-right admin-topbar-right">
            <button type="button" class="admin-topbar-icon-btn" disabled title="Thông báo (sắp có)" aria-label="Thông báo">
              <span class="admin-topbar-notify-dot" aria-hidden="true"></span>
              🔔
            </button>
            <span id="roleBadge" class="role-badge admin-role-badge" title="Vai trò"></span>
            <div class="user-chip admin-user-chip">
              <span class="user-chip-avatar" id="userAvatar">?</span>
              <div class="user-chip-text">
                <span id="userDisplayName" class="user-chip-name">—</span>
                <span id="userDisplayId" class="user-chip-id">—</span>
              </div>
            </div>
            <button type="button" class="btn btn-ghost btn-sm js-logout admin-logout-btn" id="btnLogout">Đăng xuất</button>
          </div>
        </header>

        <main class="main admin-main">
          <div class="main-inner admin-main-inner">
            <nav id="adminBreadcrumb" class="admin-breadcrumb" aria-label="Vị trí trang"></nav>
            <header class="page-header admin-page-header">
              <h1 id="pageTitle">Sửa khóa học</h1>
              <p id="pageDesc" class="page-desc" hidden></p>
            </header>
            <div id="alert" class="banner" role="status" hidden></div>
            <div id="content" class="page-content admin-page-content">
              <div class="card">
                <div class="row" style="justify-content:space-between; align-items:center">
                  <h2 style="margin:0">Thông tin khóa học</h2>
                  <a class="btn btn-ghost btn-sm" href="admin/courses.html">← Quay lại danh sách</a>
                </div>
                <form id="adCourseEditPage" style="margin-top:1rem">
                  <input type="hidden" id="adEditCourseIdPage" value="" />
                  <div class="field"><label>Tiêu đề</label><input name="title" required /></div>
                  <div class="field"><label>Mô tả</label><textarea name="description"></textarea></div>
                  <div class="grid-2">
                    <div class="field"><label>Danh mục</label><select name="categoryId" id="adEditCatPage" required></select></div>
                    <div class="field"><label>Cấp độ</label><input name="level" /></div>
                  </div>
                  <div class="field"><label>Ảnh bìa (URL)</label><input name="coverImageUrl" type="url" /></div>
                  <div class="grid-2">
                    <div class="field"><label>Ngôn ngữ</label><input name="language" /></div>
                    <div class="field"><label>Trạng thái</label>
                      <select name="status">
                        <option value="PUBLISHED">Đã xuất bản</option>
                        <option value="DRAFT">Bản nháp</option>
                        <option value="ARCHIVED">Đã gỡ</option>
                      </select>
                    </div>
                  </div>
                  <div class="field"><label>Gói nội dung</label>
                    <select name="accessTier">
                      <option value="FREE">Miễn phí (mọi tài khoản)</option>
                      <option value="PLUS">StudyHub Plus (chỉ tài khoản Plus)</option>
                    </select>
                  </div>
                  <div class="row" style="gap:0.5rem; justify-content:flex-end">
                    <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                  </div>
                </form>
              </div>

              <div class="card" style="margin-top:1rem">
                <div class="row" style="justify-content:space-between; align-items:center">
                  <h2 style="margin:0">Bài học</h2>
                  <a class="btn btn-primary btn-sm" id="adLessonAddPageLink" href="#">+ Thêm bài học</a>
                </div>
                <div id="adLessonsListPage" style="margin-top:1rem"></div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <div id="adLessonModal" class="admin-modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="adLessonModalTitle" aria-hidden="true">
    <div class="admin-modal-backdrop" id="adLessonModalBackdrop" role="presentation"></div>
    <div class="admin-modal-panel admin-modal-panel--wide">
      <button type="button" class="admin-modal-close" id="adLessonModalClose" aria-label="Đóng">×</button>
      <h2 id="adLessonModalTitle" class="admin-modal-title">Thêm bài học</h2>
      <form id="adLessonFormPage">
        <input type="hidden" name="lessonId" id="adLessonEditId" value="" />
        <div class="field"><label>Tiêu đề</label><input name="title" required /></div>
        <div class="field"><label>URL nội dung</label><input name="contentUrl" type="url" required placeholder="https://www.youtube.com/watch?v=…" /></div>
        <div class="grid-2">
          <div class="field"><label>Thứ tự</label><input name="orderIndex" type="number" min="1" required value="1" /></div>
          <div class="field"><label>Thời lượng (phút)</label><input name="duration" type="number" min="1" required value="15" /></div>
        </div>
        <div class="row" style="justify-content:flex-end; gap:0.5rem">
          <button type="button" class="btn btn-ghost" id="adLessonEditCancel">Huỷ</button>
          <button type="submit" class="btn btn-primary" id="adLessonSubmitBtn">Lưu</button>
        </div>
      </form>
    </div>
  </div>

  <div id="adCourseQuizModal" class="admin-modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="adCourseQuizModalTitle" aria-hidden="true">
    <div class="admin-modal-backdrop" id="adCourseQuizModalBackdrop" role="presentation"></div>
    <div class="admin-modal-panel admin-modal-panel--wide">
      <button type="button" class="admin-modal-close" id="adCourseQuizModalClose" aria-label="Đóng">×</button>
      <h2 id="adCourseQuizModalTitle" class="admin-modal-title">Kiểm tra / luyện tập</h2>
      <p class="muted admin-course-hint" style="margin-top:-0.25rem">Quiz của khóa học sẽ được gắn vào một “bài học” đặc biệt để học viên thấy nó như một mục trong danh sách bài.</p>
      <div id="adCourseQuizList" style="margin-top:0.75rem"></div>

      <div class="grid-2" style="margin-top:1rem">
        <div class="card" style="margin:0">
          <h3 style="margin:0 0 0.75rem;font-size:1rem">Thêm quiz</h3>
          <form id="adCourseQuizCreate">
            <div class="field"><label>Tên quiz</label><input name="title" required /></div>
            <button type="submit" class="btn btn-primary">Tạo quiz</button>
          </form>
        </div>
        <div class="card" style="margin:0">
          <h3 style="margin:0 0 0.75rem;font-size:1rem">Nhập điểm quiz</h3>
          <form id="adCourseQuizResult" class="grid-2">
            <div class="field"><label>Mã học viên</label><input name="userId" type="number" min="1" required /></div>
            <div class="field"><label>Mã quiz</label><input name="quizId" type="number" min="1" required /></div>
            <div class="field" style="grid-column:1/-1"><label>Điểm</label><input name="score" type="number" step="0.1" min="0" max="100" value="75" required /></div>
            <div style="grid-column:1/-1"><button type="submit" class="btn btn-accent">Lưu điểm</button></div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    window.__ADMIN_PAGE__ = {
      active: 'courses',
      title: 'Sửa khóa học',
      desc: '',
    };
  </script>
  <script src="js/admin-common.js?v=55"></script>
  <script src="js/admin-course-edit.js?v=62"></script>
</body>
</html>
