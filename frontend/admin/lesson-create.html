<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base href="/study-analysis/" />
  <meta name="api-root" content="/study-analysis" />
  <title>StudyHub — Thêm bài học (Admin)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css?v=50" />
</head>
<body data-app-shell="admin">
  <div id="app" class="app app--admin-dashboard" aria-hidden="false">
    <div class="admin-layout">
      <aside class="sidebar admin-sidebar" aria-label="Menu quản trị">
        <div class="admin-sidebar-brand">
          <span class="admin-brand-mark" aria-hidden="true">📚</span>
          <div class="admin-brand-text">
            <span class="admin-brand-name">Study<span class="admin-brand-accent">Hub</span></span>
            <span class="admin-brand-sub">Admin Console</span>
          </div>
        </div>
        <p class="sidebar-label admin-sidebar-label" id="navSectionLabel">Quản trị</p>
        <nav class="sidebar-nav" id="nav"></nav>
      </aside>

      <div class="admin-layout-main">
        <header class="topbar admin-topbar">
          <div class="admin-topbar-search-wrap">
            <span class="admin-search-icon" aria-hidden="true">🔍</span>
            <input
              type="search"
              class="admin-topbar-search"
              placeholder="Tìm kiếm trong quản trị…"
              disabled
              title="Tính năng đang phát triển"
              aria-label="Tìm kiếm (sắp có)"
            />
          </div>
          <div class="topbar-right admin-topbar-right">
            <button type="button" class="admin-topbar-icon-btn" disabled title="Thông báo (sắp có)" aria-label="Thông báo">
              <span class="admin-topbar-notify-dot" aria-hidden="true"></span>
              🔔
            </button>
            <span id="roleBadge" class="role-badge admin-role-badge" title="Vai trò"></span>
            <div class="user-chip admin-user-chip">
              <span class="user-chip-avatar" id="userAvatar">?</span>
              <div class="user-chip-text">
                <span id="userDisplayName" class="user-chip-name">—</span>
                <span id="userDisplayId" class="user-chip-id">—</span>
              </div>
            </div>
            <button type="button" class="btn btn-ghost btn-sm js-logout admin-logout-btn" id="btnLogout">Đăng xuất</button>
          </div>
        </header>

        <main class="main admin-main">
          <div class="main-inner admin-main-inner">
            <nav id="adminBreadcrumb" class="admin-breadcrumb" aria-label="Vị trí trang"></nav>
            <header class="page-header admin-page-header">
              <h1 id="pageTitle">Thêm bài học</h1>
              <p id="pageDesc" class="page-desc">Nhập thông tin bài học và lưu.</p>
            </header>
            <div id="alert" class="banner" role="status" hidden></div>
            <div id="content" class="page-content admin-page-content">
              <div class="card">
                <div class="row" style="justify-content:space-between;align-items:center;gap:0.75rem">
                  <div>
                    <h2 style="margin:0">Bài học mới</h2>
                    <p class="muted" style="margin:0.35rem 0 0">Khóa học: <strong id="adLessonCourseLabel">#—</strong></p>
                  </div>
                  <a class="btn btn-ghost btn-sm" id="adLessonBackLink" href="admin/courses.html">← Quay lại</a>
                </div>

                <form id="adLessonCreateForm" style="margin-top:1rem">
                  <div class="field">
                    <label>Loại</label>
                    <select name="kind" id="adLessonKind" required>
                      <option value="lesson" selected>Bài học</option>
                      <option value="quiz">Kiểm tra</option>
                    </select>
                  </div>

                  <div id="adLessonFieldsLesson">
                    <div class="field"><label>Tiêu đề</label><input name="title" required placeholder="VD: Tổng quan về SQL" /></div>
                    <div class="field"><label>URL nội dung</label><input name="contentUrl" type="url" required placeholder="https://www.youtube.com/watch?v=…" /></div>
                    <div class="grid-2">
                      <div class="field"><label>Thứ tự</label><input name="orderIndex" type="number" min="1" required value="1" /></div>
                      <div class="field"><label>Thời lượng (phút)</label><input name="duration" type="number" min="1" required value="15" /></div>
                    </div>
                  </div>

                  <div id="adLessonFieldsQuiz" class="hidden">
                    <div class="field"><label>Tên bài kiểm tra</label><input name="quizTitle" required placeholder="VD: Kiểm tra chương 1" /></div>
                    <p class="muted" style="margin:0.25rem 0 0">
                      Bài kiểm tra sẽ được tạo thành một quiz để học viên làm trực tiếp trong trang của bạn.
                    </p>
                  </div>

                  <div class="row" style="justify-content:flex-end;gap:0.5rem">
                    <button type="button" class="btn btn-ghost" id="adLessonCancelBtn">Huỷ</button>
                    <button type="submit" class="btn btn-primary" id="adLessonSubmit">Lưu</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <script>
    window.__ADMIN_PAGE__ = {
      active: 'courses',
      title: 'Thêm bài học',
      desc: 'Nhập thông tin bài học và lưu.',
    };
  </script>
  <script src="js/admin-common.js?v=55"></script>
  <script src="js/admin-lesson-create.js?v=55"></script>
</body>
</html>
